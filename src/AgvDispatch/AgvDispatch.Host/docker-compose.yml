version: '3.9'

services:
  agv-web:
    image: hainingagv:1.0
    container_name: hainingagv
    restart: always

    build:
      context: .
      dockerfile: Dockerfile

    environment:
      - ASPNETCORE_ENVIRONMENT=Production

    ports:
      - "127.0.0.1:18080:8080"

    volumes:
      - ./config/appsettings.json:/app/appsettings.json
      - ./logs:/app/logs

    networks:
      - ycnet

    deploy:
      resources:
        limits:
          memory: 1g

networks:
  ycnet:
    external: true
